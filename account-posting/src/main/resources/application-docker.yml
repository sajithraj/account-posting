# Profile active when running inside Docker Compose.
# DB_HOST / DB_PORT / DB_NAME / DB_USERNAME / DB_PASSWORD are injected as env vars.
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    show-sql: false

logging:
  level:
    com.accountposting: INFO
