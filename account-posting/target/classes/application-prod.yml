spring:
  datasource:
    # Override via env vars DB_HOST / DB_PORT / DB_NAME / DB_USERNAME / DB_PASSWORD
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/account_posting_prod
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    show-sql: false

logging:
  level:
    root: WARN
    com.accountposting: INFO
