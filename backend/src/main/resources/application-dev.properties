# ============================================================
# application-dev.properties  —  development environment
# ============================================================
# Custom app properties
app.archival.enabled=false
app.archival.cron=0 0 2 * * ?
app.archival.threshold-days=90
app.archival.batch-size=500
# Spring application
spring.application.name=account-posting
# Datasource — PostgreSQL (commented out, using Oracle for dev integration testing)
#spring.datasource.url=jdbc:postgresql://localhost:5432/account_posting_db
#spring.datasource.username=postgres
#spring.datasource.password=postgres
#spring.datasource.driver-class-name=org.postgresql.Driver
#spring.datasource.hikari.maximum-pool-size=10
#spring.datasource.hikari.minimum-idle=2
#spring.datasource.hikari.connection-timeout=30000
#spring.datasource.hikari.idle-timeout=600000
#spring.datasource.hikari.max-lifetime=1800000
# Datasource — Oracle XE 21c (local Docker)
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/XEPDB1
spring.datasource.username=account_posting_user
spring.datasource.password=oracle
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
# Jackson
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
spring.jpa.properties.hibernate.default_schema=ACCOUNT_POSTING_USER
# Server
server.port=8080
# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
# Logging
logging.level.root=INFO
logging.level.com.accountposting=DEBUG
logging.level.org.hibernate.SQL=DEBUG
