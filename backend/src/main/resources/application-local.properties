# ============================================================
# application-local.properties  —  local dev (H2 in-memory)
# ============================================================

# Custom app properties
app.kafka.enabled=false
app.kafka.topic.posting-success=account-posting-success
app.archival.enabled=false
app.archival.cron=0 0 2 * * ?
app.archival.threshold-days=90
app.archival.batch-size=500

# Spring application
spring.application.name=account-posting

# Datasource — H2 in-memory
spring.datasource.url=jdbc:h2:mem:account_posting_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Jackson
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# SQL init
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data-local.sql

# Server
server.port=8080

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Logging
logging.level.root=INFO
logging.level.com.accountposting=DEBUG
logging.level.org.hibernate.SQL=INFO
