# ============================================================
# application.properties  —  shared / base configuration
# ============================================================

# Custom app properties
app.kafka.enabled=false
app.kafka.topic.posting-success=account-posting-success

# Archival — default: daily at 02:00 server time.
# To run every 90 days use: 0 0 2 1 */3 ? (quarterly on the 1st)
app.archival.enabled=true
app.archival.cron=0 0 2 * * ?
# Records older than this many days are moved to history tables.
# Set to 80 if you want an early-archival buffer before a 90-day SLA.
app.archival.threshold-days=90
# Rows processed per committed transaction — tune for DB throughput.
app.archival.batch-size=500

# Spring application
spring.application.name=account-posting

# Jackson
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# JPA
spring.jpa.open-in-view=false

# Server
server.port=8080

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Logging
logging.level.root=INFO
logging.level.com.accountposting=DEBUG
logging.level.org.hibernate.SQL=INFO
