app:
  kafka:
    enabled: false
    topic:
      posting-success: account-posting-success
  archival:
    enabled: true
    # Cron — default: daily at 02:00 server time.
    # To run every 90 days use: 0 0 2 1 */3 ? (quarterly on the 1st)
    cron: "0 0 2 * * ?"
    # Records older than this many days are moved to history tables.
    # Set to 80 if you want an early-archival buffer before a 90-day SLA.
    threshold-days: 90
    # Rows processed per committed transaction — tune for DB throughput.
    batch-size: 500

spring:
  application:
    name: account-posting

  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

  jpa:
    open-in-view: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.accountposting: DEBUG
    org.hibernate.SQL: INFO
