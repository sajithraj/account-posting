services:
  oracle:
    image: gvenzl/oracle-xe:21.3.0
    container_name: oracle-account-posting
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: oracle
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./docker/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD", "healthcheck.sh" ]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 90s

volumes:
  oracle_data:
