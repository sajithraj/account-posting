# =============================================================================
# flyway.conf — fallback / reference config
# Prefer Maven profiles (-Pdev | -Pqa | -Puat | -Pprod) over this file.
# Use this only when running the Flyway CLI directly (not via Maven).
#
# CLI usage:
#   flyway -configFiles=flyway.conf migrate
# =============================================================================

flyway.url=jdbc:postgresql://localhost:5432/account_posting_db
flyway.user=postgres
flyway.password=postgres
flyway.schemas=public
flyway.locations=filesystem:src/main/resources/db/migration/dev
flyway.outOfOrder=false
flyway.validateOnMigrate=true
flyway.baselineOnMigrate=false
