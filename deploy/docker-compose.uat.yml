services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: account_posting_db_uat
    restart: unless-stopped
    environment:
      POSTGRES_DB: account_posting_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_uat:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d account_posting_db" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-net

  # ── DB migrations (Flyway) — runs once then exits ──────────────────────────
  flyway:
    image: flyway/flyway:11-alpine
    container_name: account_posting_flyway_uat
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../db/src/main/resources/db/migration/uat:/flyway/sql
    command: >
      -url=jdbc:postgresql://postgres:5432/account_posting_db
      -user=postgres
      -password=postgres
      -schemas=public
      migrate
    networks:
      - app-net

  # ── Spring Boot API ────────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: backend_api_uat
    restart: unless-stopped
    depends_on:
      flyway:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: uat
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/account_posting_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SERVER_PORT: 8080
      KAFKA_ENABLED: "false"
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - app-net

  # ── React UI (nginx) ───────────────────────────────────────────────────────
  ui:
    build:
      context: ../ui
      dockerfile: Dockerfile
    container_name: account_posting_ui_uat
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  postgres_data_uat:
