services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: account_posting_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: account_posting_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d account_posting_db" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-net

  # ── DB migrations (Flyway) — runs once then exits ──────────────────────────
  flyway:
    image: flyway/flyway:11-alpine
    container_name: account_posting_flyway
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./db/src/main/resources/db/migration:/flyway/sql
    command: >
      -url=jdbc:postgresql://postgres:5432/account_posting_db
      -user=postgres
      -password=postgres
      -schemas=public
      migrate
    networks:
      - app-net

  # ── Spring Boot API ────────────────────────────────────────────────────────
  account-posting:
    build:
      context: ./account-posting
      dockerfile: Dockerfile
    container_name: account_posting_api
    restart: unless-stopped
    depends_on:
      flyway:
        condition: service_completed_successfully
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: account_posting_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/api/actuator/health | grep -q UP || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - app-net

  # ── React UI (nginx) ───────────────────────────────────────────────────────
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: account_posting_ui
    restart: unless-stopped
    depends_on:
      account-posting:
        condition: service_healthy
    ports:
      - "3000:80"
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  postgres_data:
