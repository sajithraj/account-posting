openapi: 3.0.3

info:
  title: Account Posting Orchestrator API
  version: 2.0.0
  description: |
    Accepts posting requests from upstream systems, delivers them to a core banking
    orchestrator, tracks every response leg, and provides retry capability.

    ## Naming Convention
    All JSON request bodies, response payloads, and query parameters use **snake_case**
    field names (Jackson `SNAKE_CASE` property naming strategy applied globally).

    ## Error Envelope
    All error responses share the same structure — see the `ErrorResponse` schema.

    ## Enums
    | Enum | Values |
    |------|--------|
    | `credit_debit_indicator` | `CREDIT` \| `DEBIT` |
    | `posting_status` | `PNDG` (pending) \| `ACSP` (accepted/success) \| `RJCT` (rejected) |
    | `leg_status` | `PENDING` \| `SUCCESS` \| `FAILED` |
    | `leg_mode` | `NORM` \| `RETRY` \| `MANUAL` |

    ## Source Names → Request Types (canonical from dev DB)
    | source_name | request_type | target legs |
    |-------------|-------------|------------|
    | `IMX` | `IMX_CBS_GL` | CBS POSTING (order 1) → GL POSTING (order 2) |
    | `IMX` | `IMX_OBPM` | OBPM POSTING (order 1) |
    | `RMS` | `FED_RETURN` | CBS POSTING (order 1) → GL POSTING (order 2) |
    | `RMS` | `GL_RETURN` | GL POSTING (order 1) → GL POSTING (order 2) |
    | `RMS` | `MCA_RETURN` | OBPM POSTING (order 1) |
    | `STABLECOIN` | `CUSTOMER_POSTING` | CBS POSTING (order 1) → GL POSTING (order 2) |
    | `STABLECOIN` | `BUY_CUSTOMER_POSTING` | CBS POSTING (order 2) → GL POSTING (order 3) |
    | `STABLECOIN` | `BUY_CUSTOMER_POSTING` | CBS REMOVE_HOLD (order 1) |
    | `STABLECOIN` | `ADD_ACCOUNT_HOLD` | CBS ADD_HOLD (order 1) |

    ## Target Systems & Operations
    | target_system | operations |
    |--------------|-----------|
    | `CBS` | `POSTING`, `ADD_HOLD`, `REMOVE_HOLD` |
    | `GL` | `POSTING` |
    | `OBPM` | `POSTING` |

servers:
  - url: http://localhost:8080
    description: Local development (H2 in-memory, profile=local)
  - url: http://localhost:8080
    description: Dev (PostgreSQL via Docker, profile=dev)
  - url: http://localhost:8080
    description: QA
  - url: http://localhost:8080
    description: UAT
  - url: http://localhost:8080
    description: Production

tags:
  - name: Account Posting
    description: Core posting lifecycle — create, search, retrieve, retry, and history
  - name: Posting Legs
    description: Manage individual legs of a posting
  - name: Posting Config
    description: Routing configuration — maps source_name + request_type to ordered target systems

# ─────────────────────────────────────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────────────────────────────────────
paths:

  # ── Account Posting ─────────────────────────────────────────────────────────

  /v2/payment/account-posting:
    post:
      tags: [ Account Posting ]
      summary: Create a posting
      description: |
        Submits a new posting request. The service:
        1. Checks idempotency on `end_to_end_reference_id` — duplicate returns HTTP 422
        2. Persists the posting with status `PNDG`
        3. Validates the payload (bean validation + enum validation) — failure marks posting `RJCT`
        4. Resolves the routing config for `request_type` from `posting_config`
        5. Pre-inserts all legs as `PENDING` before calling any external system
        6. Calls each target system in `order_seq` order via the matching `PostingStrategy`
        7. Updates the posting status to `ACSP` (all legs SUCCESS) or `PNDG` (any leg failed)
      operationId: createPosting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IncomingPostingRequest'
            examples:
              imx_cbs_gl:
                summary: IMX — IMX_CBS_GL (CBS → GL, 2 legs)
                value:
                  source_name: "IMX"
                  source_reference_id: "SRC-001"
                  end_to_end_reference_id: "E2E-001"
                  credit_debit_indicator: "DEBIT"
                  request_type: "IMX_CBS_GL"
                  product_code: "FT"
                  clearing_system: "SWIFT"
                  requested_execution_date: "2026-03-23"
                  debtor_account: "1324658900"
                  creditor_account: "9875312300"
                  remittance_information: "Invoice payment INV-2026-001"
                  direction: "OUTGOING"
                  amount:
                    value: "1500.00"
                    currency_code: "USD"
              imx_obpm:
                summary: IMX — IMX_OBPM (OBPM, 1 leg)
                value:
                  source_name: "IMX"
                  source_reference_id: "SRC-002"
                  end_to_end_reference_id: "E2E-002"
                  credit_debit_indicator: "CREDIT"
                  request_type: "IMX_OBPM"
                  product_code: "FT"
                  clearing_system: "SWIFT"
                  requested_execution_date: "2026-03-23"
                  debtor_account: "1234567890"
                  creditor_account: "0987654321"
                  amount:
                    value: "800.00"
                    currency_code: "USD"
              rms_fed_return:
                summary: RMS — FED_RETURN (CBS → GL, 2 legs)
                value:
                  source_name: "RMS"
                  source_reference_id: "SRC-003"
                  end_to_end_reference_id: "E2E-003"
                  credit_debit_indicator: "CREDIT"
                  request_type: "FED_RETURN"
                  requested_execution_date: "2026-03-23"
                  debtor_account: "1234567890"
                  creditor_account: "0987654321"
                  amount:
                    value: "500.00"
                    currency_code: "USD"
              stablecoin_add_hold:
                summary: STABLECOIN — ADD_ACCOUNT_HOLD (CBS ADD_HOLD, 1 leg)
                value:
                  source_name: "STABLECOIN"
                  source_reference_id: "SRC-004"
                  end_to_end_reference_id: "E2E-004"
                  credit_debit_indicator: "DEBIT"
                  request_type: "ADD_ACCOUNT_HOLD"
                  requested_execution_date: "2026-03-23"
                  debtor_account: "1234567890"
                  creditor_account: "0987654321"
                  amount:
                    value: "5000.00"
                    currency_code: "USD"
              stablecoin_buy_customer_posting:
                summary: STABLECOIN — BUY_CUSTOMER_POSTING (CBS REMOVE_HOLD, 1 leg)
                value:
                  source_name: "STABLECOIN"
                  source_reference_id: "SRC-005"
                  end_to_end_reference_id: "E2E-005"
                  credit_debit_indicator: "DEBIT"
                  request_type: "BUY_CUSTOMER_POSTING"
                  requested_execution_date: "2026-03-23"
                  debtor_account: "1234567890"
                  creditor_account: "0987654321"
                  amount:
                    value: "5000.00"
                    currency_code: "USD"
      responses:
        '201':
          description: Posting created and processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountPostingCreateResponse'
              example:
                source_reference_id: "SRC-001"
                end_to_end_reference_id: "E2E-001"
                posting_status: "ACSP"
                processed_at: "2026-03-23T10:15:30Z"
                responses:
                  - name: "CBS"
                    type: "CBS"
                    account: "1324658900"
                    reference_id: "CBS-TXN-001"
                    posted_time: "2026-03-23T10:15:30Z"
                    status: "SUCCESS"
                    reason: null
                  - name: "GL"
                    type: "GL"
                    account: "9875312300"
                    reference_id: "GL-TXN-001"
                    posted_time: "2026-03-23T10:15:30Z"
                    status: "SUCCESS"
                    reason: null
        '400':
          description: |
            Validation failure or malformed request.

            | `name` | Cause |
            |--------|-------|
            | `VALIDATION_FAILED` | Bean validation — missing/blank/invalid fields; includes `errors[]` array |
            | `INVALID_ENUM_VALUE` | `source_name` or `request_type` not in the allowed enum set |
            | `INVALID_REQUEST_BODY` | Unparseable JSON body |
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                validation_failed:
                  summary: Missing required fields
                  value:
                    id: "b7a44802-adde-4a5a-97b6-52f962209773"
                    name: "VALIDATION_FAILED"
                    message: "Request validation failed"
                    errors:
                      - field: "source_reference_id"
                        message: "must not be blank"
                        rejected_value: null
                      - field: "credit_debit_indicator"
                        message: "must not be null"
                        rejected_value: null
                invalid_enum:
                  summary: Unknown source_name
                  value:
                    id: "c1d2e3f4-0000-0000-0000-000000000001"
                    name: "INVALID_ENUM_VALUE"
                    message: "INVALID_ENUM_VALUE: sourceName 'UNKNOWN_SRC' is not valid"
                    errors: null
        '422':
          description: |
            Business rule violation.

            | `name` | Cause |
            |--------|-------|
            | `DUPLICATE_E2E_REF` | `end_to_end_reference_id` already exists |
            | `NO_CONFIG_FOUND` | No `posting_config` entry for the given `request_type` |
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                duplicate_e2e:
                  summary: Duplicate end-to-end reference
                  value:
                    id: "a1b2c3d4-0000-0000-0000-000000000001"
                    name: "DUPLICATE_E2E_REF"
                    message: "A posting with this end-to-end reference ID already exists"
                    errors: null
                no_config:
                  summary: No routing config found
                  value:
                    id: "a1b2c3d4-0000-0000-0000-000000000002"
                    name: "NO_CONFIG_FOUND"
                    message: "No posting config found for requestType: UNKNOWN_TYPE"
                    errors: null
        '500':
          $ref: '#/components/responses/InternalError'

    get:
      tags: [ Account Posting ]
      summary: Search postings (active table)
      description: |
        Paginated search of the active `account_posting` table with optional filters.
        All parameters are optional and composable. Returns an empty page if no results.

        Use `GET /v2/payment/account-posting/history` to query archived records.
      operationId: searchPostings
      parameters:
        - name: status
          in: query
          description: "Filter by posting status. Valid values: PNDG | ACSP | RJCT"
          schema:
            $ref: '#/components/schemas/PostingStatus'
        - name: sourceName
          in: query
          description: Filter by originating system name
          schema:
            type: string
            example: IMX
        - name: requestType
          in: query
          description: Filter by request type
          schema:
            type: string
            example: IMX_CBS_GL
        - name: sourceReferenceId
          in: query
          description: Filter by source system reference (exact match)
          schema:
            type: string
        - name: endToEndReferenceId
          in: query
          description: Filter by end-to-end reference (exact match)
          schema:
            type: string
        - name: targetSystem
          in: query
          description: Filter by target system (LIKE match on target_systems column)
          schema:
            type: string
            example: CBS
        - name: fromDate
          in: query
          description: Filter by requested_execution_date >= fromDate (ISO 8601 date)
          schema:
            type: string
            format: date
            example: "2026-03-01"
        - name: toDate
          in: query
          description: Filter by requested_execution_date <= toDate (ISO 8601 date)
          schema:
            type: string
            format: date
            example: "2026-03-31"
        - name: page
          in: query
          description: Zero-based page number
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          description: Page size
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 200
        - name: sort
          in: query
          description: Sort field and direction (e.g. `postingId,desc`)
          schema:
            type: string
            example: postingId,desc
      responses:
        '200':
          description: Paginated list of postings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedAccountPostingResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /v2/payment/account-posting/history:
    get:
      tags: [ Account Posting ]
      summary: Search postings (history / archive table)
      description: |
        Paginated search of the `account_posting_history` table (records moved there by the
        archival job after the configured retention period).

        Accepts the same filter parameters as `GET /v2/payment/account-posting`.
        `GET /v2/payment/account-posting/{postingId}` is transparent — it checks the active
        table first and falls back to history automatically. Use this endpoint only when you
        need to explicitly query historical data in bulk.
      operationId: searchPostingsHistory
      parameters:
        - name: status
          in: query
          description: "Filter by posting status. Valid values: PNDG | ACSP | RJCT"
          schema:
            $ref: '#/components/schemas/PostingStatus'
        - name: sourceName
          in: query
          schema:
            type: string
            example: IMX
        - name: requestType
          in: query
          schema:
            type: string
            example: IMX_CBS_GL
        - name: sourceReferenceId
          in: query
          schema:
            type: string
        - name: endToEndReferenceId
          in: query
          schema:
            type: string
        - name: targetSystem
          in: query
          schema:
            type: string
            example: CBS
        - name: fromDate
          in: query
          schema:
            type: string
            format: date
            example: "2026-01-01"
        - name: toDate
          in: query
          schema:
            type: string
            format: date
            example: "2026-03-31"
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: sort
          in: query
          schema:
            type: string
            example: postingId,desc
      responses:
        '200':
          description: Paginated list of archived postings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedAccountPostingResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /v2/payment/account-posting/{posting_id}:
    get:
      tags: [ Account Posting ]
      summary: Get posting by ID
      description: |
        Returns a single posting with all its legs.
        Checks the active table first; if not found, transparently falls back to the history
        table. Callers do not need to know which table holds the record.
      operationId: getPostingById
      parameters:
        - $ref: '#/components/parameters/PostingId'
      responses:
        '200':
          description: Posting found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountPostingResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /v2/payment/account-posting/retry:
    post:
      tags: [ Account Posting ]
      summary: Retry non-SUCCESS legs on PNDG postings
      description: |
        Re-processes failed or pending legs on `PNDG` postings.

        **Flow:**
        1. Resolve candidate IDs — if `posting_ids` omitted, `findEligibleIdsForRetry` selects
           all `PNDG` postings where `retry_locked_until` is null or expired
        2. Lock atomically — single `@Modifying` JPQL UPDATE sets `retry_locked_until = NOW() + 120s`
        3. Dispatch one `CompletableFuture` per locked posting to the `retryExecutor` thread pool
        4. Each `PostingRetryProcessorV2` runs in its own transaction:
           - Fetches non-SUCCESS legs ordered by `leg_order`
           - Resolves strategy by `{target_system}_{operation}` key
           - Calls the external system stub; updates leg to SUCCESS or FAILED
           - Re-evaluates all legs: posts → `ACSP` if all SUCCESS, else `PNDG`
           - **Always clears `retry_locked_until`** — posting immediately retryable again
        5. Aggregates results and returns

        **Strategies resolved during retry:**
        `CBS_POSTING` | `GL_POSTING` | `OBPM_POSTING` | `CBS_ADD_HOLD` | `CBS_REMOVE_HOLD`
      operationId: retryPostings
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetryRequest'
            examples:
              retry_all:
                summary: Retry all eligible PNDG postings
                value: { }
              retry_specific:
                summary: Retry specific posting IDs
                value:
                  posting_ids: [ 1, 2, 3 ]
      responses:
        '200':
          description: Retry completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetryResponse'
              example:
                total_postings: 3
                success_count: 2
                failed_count: 1
        '500':
          $ref: '#/components/responses/InternalError'

  # ── Posting Legs ────────────────────────────────────────────────────────────

  /v2/payment/account-posting/{posting_id}/leg:
    get:
      tags: [ Posting Legs ]
      summary: List legs for a posting
      description: Returns all legs for a given posting ordered by `leg_order`.
      operationId: listLegs
      parameters:
        - $ref: '#/components/parameters/PostingId'
      responses:
        '200':
          description: List of legs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccountPostingLegResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /v2/payment/account-posting/{posting_id}/leg/{posting_leg_id}:
    get:
      tags: [ Posting Legs ]
      summary: Get a single leg
      operationId: getLeg
      parameters:
        - $ref: '#/components/parameters/PostingId'
        - $ref: '#/components/parameters/PostingLegId'
      responses:
        '200':
          description: Leg found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountPostingLegResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    patch:
      tags: [ Posting Legs ]
      summary: Manual status update (UI)
      description: |
        Sets the leg status directly from the UI. Sets `mode = MANUAL`.
        Does **not** increment `attempt_number` or call any external system.
        An optional `reason` can be provided to record the override explanation.
      operationId: manualUpdateLeg
      parameters:
        - $ref: '#/components/parameters/PostingId'
        - $ref: '#/components/parameters/PostingLegId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManualUpdateLegRequest'
            examples:
              mark_success:
                summary: Manually mark leg as SUCCESS
                value:
                  status: "SUCCESS"
                  reason: "Confirmed by ops team"
              mark_failed:
                summary: Manually mark leg as FAILED
                value:
                  status: "FAILED"
                  reason: "Rejected by CBS — duplicate transaction"
      responses:
        '200':
          description: Leg status updated manually
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountPostingLegResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # ── Posting Config ──────────────────────────────────────────────────────────

  /v2/payment/account-posting/config:
    get:
      tags: [ Posting Config ]
      summary: Get all config entries
      description: Returns every row in `posting_config` ordered by `config_id`.
      operationId: getAllConfig
      responses:
        '200':
          description: Full config list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PostingConfigResponse'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      tags: [ Posting Config ]
      summary: Create a config entry
      description: |
        Adds a new routing rule. Duplicate `(request_type, order_seq)` → HTTP 422.
        Call `POST /v2/payment/account-posting/config/cache/flush` after bulk changes.
      operationId: createConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostingConfigRequest'
            example:
              source_name: "IMX"
              request_type: "IMX_CBS_GL"
              target_system: "CBS"
              operation: "POSTING"
              order_seq: 1
      responses:
        '201':
          description: Config entry created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostingConfigResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '422':
          description: Duplicate (request_type, order_seq)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                id: "d4e5f6a7-0000-0000-0000-000000000001"
                name: "DUPLICATE_CONFIG_ORDER"
                message: "A config entry with the same request type and order already exists"
                errors: null
        '500':
          $ref: '#/components/responses/InternalError'

  /v2/payment/account-posting/config/cache/flush:
    post:
      tags: [ Posting Config ]
      summary: Flush the config cache
      description: |
        Evicts the in-memory Caffeine cache (`configsByRequestType`, 500 max, 1h TTL)
        so the next request reloads from the database.
        Call this after bulk SQL inserts/updates or after a Flyway migration that modifies `posting_config`.
      operationId: flushConfigCache
      responses:
        '204':
          description: Cache flushed successfully
        '500':
          $ref: '#/components/responses/InternalError'

  /v2/payment/account-posting/config/{request_type}:
    get:
      tags: [ Posting Config ]
      summary: Get config entries by request type
      description: |
        Returns the ordered legs (target_system + operation) for a given `request_type`.
        Result is cached — stale after config changes until `cache/flush` is called.
      operationId: getConfigByRequestType
      parameters:
        - name: request_type
          in: path
          required: true
          description: The request type to look up (e.g. `IMX_CBS_GL`, `FED_RETURN`)
          schema:
            type: string
            example: IMX_CBS_GL
      responses:
        '200':
          description: Config entries for the given request type
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PostingConfigResponse'
              example:
                - config_id: 1
                  source_name: "IMX"
                  request_type: "IMX_CBS_GL"
                  target_system: "CBS"
                  operation: "POSTING"
                  order_seq: 1
                - config_id: 2
                  source_name: "IMX"
                  request_type: "IMX_CBS_GL"
                  target_system: "GL"
                  operation: "POSTING"
                  order_seq: 2
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /v2/payment/account-posting/config/{config_id}:
    put:
      tags: [ Posting Config ]
      summary: Update a config entry
      operationId: updateConfig
      parameters:
        - $ref: '#/components/parameters/ConfigId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostingConfigRequest'
      responses:
        '200':
          description: Config entry updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostingConfigResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Duplicate (request_type, order_seq)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags: [ Posting Config ]
      summary: Delete a config entry
      operationId: deleteConfig
      parameters:
        - $ref: '#/components/parameters/ConfigId'
      responses:
        '204':
          description: Config entry deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

# ─────────────────────────────────────────────────────────────────────────────
# COMPONENTS
# ─────────────────────────────────────────────────────────────────────────────
components:

  # ── Parameters ──────────────────────────────────────────────────────────────
  parameters:
    PostingId:
      name: posting_id
      in: path
      required: true
      description: Unique posting identifier
      schema:
        type: integer
        format: int64
        example: 1

    PostingLegId:
      name: posting_leg_id
      in: path
      required: true
      description: Unique posting leg identifier
      schema:
        type: integer
        format: int64
        example: 1

    ConfigId:
      name: config_id
      in: path
      required: true
      description: Unique posting config identifier
      schema:
        type: integer
        format: int64
        example: 1

  # ── Reusable Responses ───────────────────────────────────────────────────────
  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            id: "f1e2d3c4-0000-0000-0000-000000000001"
            name: "NOT_FOUND"
            message: "AccountPosting not found with id: 99"
            errors: null

    ValidationError:
      description: Bean validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            id: "b7a44802-adde-4a5a-97b6-52f962209773"
            name: "VALIDATION_FAILED"
            message: "Request validation failed"
            errors:
              - field: "source_reference_id"
                message: "must not be blank"
                rejected_value: null

    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            id: "e9f8a7b6-0000-0000-0000-000000000001"
            name: "INTERNAL_ERROR"
            message: "An unexpected error occurred"
            errors: null

  # ── Schemas ──────────────────────────────────────────────────────────────────
  schemas:

    # ── Enums ─────────────────────────────────────────────────────────────────
    PostingStatus:
      type: string
      enum: [ PNDG, ACSP, RJCT ]
      description: |
        Lifecycle status of an account posting:
        - `PNDG` — pending (initial state; also set when one or more legs fail)
        - `ACSP` — accepted / all legs succeeded
        - `RJCT` — rejected (validation failure or no routing config found)

    LegStatus:
      type: string
      enum: [ PENDING, SUCCESS, FAILED ]
      description: Lifecycle status of a posting leg

    LegMode:
      type: string
      enum: [ NORM, RETRY, MANUAL ]
      description: |
        How the leg was last processed:
        - `NORM` — initial posting call
        - `RETRY` — re-executed via the retry flow
        - `MANUAL` — status set manually from the UI

    CreditDebitIndicator:
      type: string
      enum: [ CREDIT, DEBIT ]
      description: Direction of the posting from the debtor's perspective

    # ── Requests ──────────────────────────────────────────────────────────────
    Amount:
      type: object
      description: Transaction amount with currency
      properties:
        value:
          type: string
          description: Transaction amount as a string. Must represent a positive decimal number.
          example: "1500.00"
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
          description: ISO 4217 3-letter currency code
          example: "USD"

    IncomingPostingRequest:
      type: object
      description: Payload for creating a new account posting
      required:
        - source_name
        - source_reference_id
        - end_to_end_reference_id
        - credit_debit_indicator
        - request_type
        - requested_execution_date
        - debtor_account
        - creditor_account
        - amount
      properties:
        source_name:
          type: string
          description: "Name of the originating system. Valid values: IMX | RMS | STABLECOIN"
          example: "IMX"
        source_reference_id:
          type: string
          description: Upstream system's own reference for this posting
          example: "SRC-20260323-001"
        end_to_end_reference_id:
          type: string
          description: Unique end-to-end identifier. Used for idempotency — duplicate value returns HTTP 422.
          example: "E2E-20260323-001"
        credit_debit_indicator:
          type: string
          description: "Direction of the posting. Valid values: CREDIT | DEBIT"
          example: "DEBIT"
        request_type:
          type: string
          description: Transaction type that determines the routing strategy from `posting_config`.
          example: "IMX_CBS_GL"
        product_code:
          type: string
          description: Product code for the transaction
          example: "FT"
        clearing_system:
          type: string
          description: Clearing system used for the transaction
          example: "SWIFT"
        requested_execution_date:
          type: string
          description: Requested value date (ISO 8601 date string)
          example: "2026-03-23"
        debtor_account:
          type: string
          description: Account number of the debtor
          example: "1324658900"
        creditor_account:
          type: string
          description: Account number of the creditor
          example: "9875312300"
        remittance_information:
          type: string
          description: Free-text payment reference (optional)
          example: "Invoice payment INV-2026-001"
        direction:
          type: string
          description: "Direction of the payment flow. E.g. OUTGOING | INCOMING"
          example: "OUTGOING"
        amount:
          $ref: '#/components/schemas/Amount'
        team_code:
          type: string
          description: Team code for routing or ownership identification
          example: "PAYMENTS"
        debit_rc:
          type: string
          description: Debit RC reference
          example: "DB-RC-001"
        credit_rc:
          type: string
          description: Credit RC reference
          example: "CR-RC-001"
        transaction_code:
          type: string
          description: Transaction code for the posting
          example: "TXN-CODE-01"
        branch:
          type: string
          description: Branch identifier for the posting
          example: "BRANCH-001"
        loan_type:
          type: string
          description: Loan type associated with the posting
          example: "PERSONAL"
        line_desc:
          type: string
          description: Line description for the posting entry
          example: "Customer payment flow"
        cif:
          type: string
          description: Customer Information File number
          example: "CIF-123456"
        customer_name:
          type: string
          description: Name of the customer associated with the transaction
          example: "John Doe"
        hold_id:
          type: string
          description: Hold identifier for CBS hold operations
          example: "HOLD-001"

    RetryRequest:
      type: object
      description: |
        Specifies which postings to retry. Omit `posting_ids` (or send an empty object)
        to retry all eligible `PNDG` postings (those not currently locked).
      properties:
        posting_ids:
          type: array
          items:
            type: integer
            format: int64
          description: Specific posting IDs to retry. If absent or empty, all eligible PNDG postings are targeted.
          example: [ 1, 2, 3 ]

    ManualUpdateLegRequest:
      type: object
      description: Payload for manually overriding a leg status from the UI. Sets `mode = MANUAL`.
      required:
        - status
      properties:
        status:
          $ref: '#/components/schemas/LegStatus'
        reason:
          type: string
          maxLength: 500
          description: Optional explanation for the manual override
          example: "Confirmed by ops team — CBS reference verified manually"

    PostingConfigRequest:
      type: object
      description: Payload for creating or updating a routing config entry
      required:
        - source_name
        - request_type
        - target_system
        - operation
        - order_seq
      properties:
        source_name:
          type: string
          description: "Originating system name. Valid values: IMX | RMS | STABLECOIN"
          example: "IMX"
        request_type:
          type: string
          description: Transaction type
          example: "IMX_CBS_GL"
        target_system:
          type: string
          description: "External system to route to. Valid values: CBS | GL | OBPM"
          example: "CBS"
        operation:
          type: string
          description: "Operation to perform. Valid values: POSTING | ADD_HOLD | REMOVE_HOLD"
          example: "POSTING"
        order_seq:
          type: integer
          minimum: 1
          description: Execution order (1-based). Must be unique per `request_type`.
          example: 1

    # ── Responses ─────────────────────────────────────────────────────────────
    AccountPostingCreateResponse:
      type: object
      description: Response returned immediately after a posting is created and processed
      properties:
        source_reference_id:
          type: string
          example: "SRC-20260323-001"
        end_to_end_reference_id:
          type: string
          example: "E2E-20260323-001"
        posting_status:
          $ref: '#/components/schemas/PostingStatus'
        processed_at:
          type: string
          format: date-time
          description: Timestamp when processing completed
          example: "2026-03-23T10:15:30Z"
        responses:
          type: array
          description: Result from each leg processed during this call
          items:
            $ref: '#/components/schemas/LegCreateResponse'

    LegCreateResponse:
      type: object
      description: Summary result of a single leg during the initial create flow
      properties:
        name:
          type: string
          description: Target system identifier
          example: "CBS"
        type:
          type: string
          description: Leg type
          example: "CBS"
        account:
          type: string
          example: "1324658900"
        reference_id:
          type: string
          description: Reference ID returned by the external system (null if failed)
          example: "CBS-TXN-001"
        posted_time:
          type: string
          format: date-time
          example: "2026-03-23T10:15:30Z"
        status:
          type: string
          example: "SUCCESS"
        reason:
          type: string
          description: Error message if failed, null on success
          nullable: true
          example: null

    AccountPostingResponse:
      type: object
      description: Full posting detail including all legs
      properties:
        posting_id:
          type: integer
          format: int64
          example: 1
        source_reference_id:
          type: string
          example: "SRC-20260323-001"
        end_to_end_reference_id:
          type: string
          example: "E2E-20260323-001"
        source_name:
          type: string
          example: "IMX"
        request_type:
          type: string
          example: "IMX_CBS_GL"
        amount:
          type: number
          format: decimal
          example: 1500.00
        currency:
          type: string
          example: "USD"
        credit_debit_indicator:
          type: string
          example: "DEBIT"
        debtor_account:
          type: string
          example: "1324658900"
        creditor_account:
          type: string
          example: "9875312300"
        requested_execution_date:
          type: string
          format: date
          example: "2026-03-23"
        remittance_information:
          type: string
          nullable: true
          example: "Invoice payment INV-2026-001"
        posting_status:
          $ref: '#/components/schemas/PostingStatus'
        target_systems:
          type: string
          description: Concatenated target system keys in execution order (e.g. `CBS_GL`)
          example: "CBS_GL"
        reason:
          type: string
          nullable: true
          description: |
            Processing outcome:
            - `"Request processed successfully"` — all legs succeeded
            - Error message of the last failed leg — if any leg failed
          example: "Request processed successfully"
        processed_at:
          type: string
          format: date-time
          nullable: true
          example: "2026-03-23T10:15:30Z"
        created_at:
          type: string
          format: date-time
          example: "2026-03-23T10:15:29Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-03-23T10:15:30Z"
        responses:
          type: array
          description: Leg results
          items:
            $ref: '#/components/schemas/LegResponse'

    LegResponse:
      type: object
      description: Leg summary as embedded in AccountPostingResponse
      properties:
        posting_leg_id:
          type: integer
          format: int64
          example: 1
        leg_order:
          type: integer
          example: 1
        name:
          type: string
          description: Target system identifier
          example: "CBS"
        type:
          type: string
          example: "CBS"
        account:
          type: string
          example: "1324658900"
        reference_id:
          type: string
          nullable: true
          example: "CBS-TXN-001"
        posted_time:
          type: string
          format: date-time
          nullable: true
          example: "2026-03-23T10:15:30Z"
        status:
          type: string
          example: "SUCCESS"
        reason:
          type: string
          nullable: true
          example: null
        mode:
          type: string
          example: "NORM"

    AccountPostingLegResponse:
      type: object
      description: Full leg detail returned by the leg endpoints
      properties:
        posting_leg_id:
          type: integer
          format: int64
          example: 1
        posting_id:
          type: integer
          format: int64
          example: 1
        leg_order:
          type: integer
          example: 1
        target_system:
          type: string
          example: "CBS"
        account:
          type: string
          example: "1324658900"
        status:
          $ref: '#/components/schemas/LegStatus'
        reference_id:
          type: string
          nullable: true
          example: "CBS-TXN-001"
        reason:
          type: string
          nullable: true
          example: null
        attempt_number:
          type: integer
          description: How many times this leg has been attempted (starts at 1)
          example: 1
        posted_time:
          type: string
          format: date-time
          nullable: true
          example: "2026-03-23T10:15:30Z"
        mode:
          $ref: '#/components/schemas/LegMode'
        operation:
          type: string
          description: "Operation type: POSTING | ADD_HOLD | REMOVE_HOLD"
          example: "POSTING"
        created_at:
          type: string
          format: date-time
          example: "2026-03-23T10:15:29Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-03-23T10:15:30Z"

    PostingConfigResponse:
      type: object
      description: A single routing config entry
      properties:
        config_id:
          type: integer
          format: int64
          example: 1
        source_name:
          type: string
          example: "IMX"
        request_type:
          type: string
          example: "IMX_CBS_GL"
        target_system:
          type: string
          example: "CBS"
        operation:
          type: string
          example: "POSTING"
        order_seq:
          type: integer
          example: 1

    RetryResponse:
      type: object
      description: Summary of a retry operation — counts at posting level (not leg level)
      properties:
        total_postings:
          type: integer
          description: Total number of postings processed in this retry run
          example: 3
        success_count:
          type: integer
          description: Number of postings that reached ACSP (all legs SUCCESS)
          example: 2
        failed_count:
          type: integer
          description: Number of postings that remained PNDG after retry
          example: 1

    PagedAccountPostingResponse:
      type: object
      description: Spring Data paginated response wrapping a list of AccountPostingResponse
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/AccountPostingResponse'
        pageable:
          $ref: '#/components/schemas/Pageable'
        total_elements:
          type: integer
          format: int64
          description: Total number of records matching the filter
          example: 42
        total_pages:
          type: integer
          description: Total number of pages
          example: 3
        number:
          type: integer
          description: Current page number (0-based)
          example: 0
        size:
          type: integer
          description: Requested page size
          example: 20
        number_of_elements:
          type: integer
          description: Number of elements on the current page
          example: 20
        first:
          type: boolean
          example: true
        last:
          type: boolean
          example: false
        empty:
          type: boolean
          example: false

    Pageable:
      type: object
      description: Spring Data pageable metadata
      properties:
        page_number:
          type: integer
          example: 0
        page_size:
          type: integer
          example: 20
        sort:
          type: object
          properties:
            sorted:
              type: boolean
            unsorted:
              type: boolean
            empty:
              type: boolean
        offset:
          type: integer
          format: int64
          example: 0
        paged:
          type: boolean
          example: true
        unpaged:
          type: boolean
          example: false

    ErrorResponse:
      type: object
      description: |
        Uniform error envelope returned for all 4xx and 5xx responses.

        | HTTP | `name` | Description |
        |------|--------|-------------|
        | 400 | `VALIDATION_FAILED` | Bean validation — `errors[]` array populated |
        | 400 | `INVALID_ENUM_VALUE` | Unknown `source_name` or `request_type` |
        | 400 | `INVALID_REQUEST_BODY` | Unparseable JSON body |
        | 404 | `NOT_FOUND` | Entity not found by ID |
        | 422 | `DUPLICATE_E2E_REF` | Duplicate `end_to_end_reference_id` |
        | 422 | `NO_CONFIG_FOUND` | No routing config for the given `request_type` |
        | 422 | `DUPLICATE_CONFIG_ORDER` | Duplicate `(request_type, order_seq)` in config |
        | 422 | `DATA_INTEGRITY_VIOLATION` | Other DB constraint violation |
        | 500 | `INTERNAL_ERROR` | Unhandled exception |
      properties:
        id:
          type: string
          format: uuid
          description: Unique error trace ID for log correlation
          example: "b7a44802-adde-4a5a-97b6-52f962209773"
        name:
          type: string
          description: Machine-readable error code
          example: "VALIDATION_FAILED"
        message:
          type: string
          description: Human-readable error description
          example: "Request validation failed"
        errors:
          type: array
          description: Field-level validation errors — populated only for `VALIDATION_FAILED`
          nullable: true
          items:
            $ref: '#/components/schemas/FieldError'

    FieldError:
      type: object
      description: A single field-level validation error
      properties:
        field:
          type: string
          description: The field name that failed validation
          example: "source_reference_id"
        message:
          type: string
          description: Validation constraint message
          example: "must not be blank"
        rejected_value:
          description: The value that was rejected (null if the field was absent)
          nullable: true
          example: null
