openapi: 3.0.3

info:
  title: Account Posting Orchestrator API
  version: 2.0.0
  description: Accepts posting requests, routes them to core banking systems, tracks each transaction, and supports retry.

servers:
  - url: http://localhost:8080
    description: Local development (H2 in-memory, profile=local)
  - url: http://localhost:8080
    description: Dev (PostgreSQL via Docker, profile=dev)
  - url: http://localhost:8080
    description: QA
  - url: http://localhost:8080
    description: UAT
  - url: http://localhost:8080
    description: Production

tags:
  - name: Account Posting
    description: Core posting lifecycle — create, search, retrieve, retry, and history
  - name: Posting Transactions
    description: Manage individual transactions of a posting
  - name: Posting Config
    description: Routing configuration — maps source_name + request_type to ordered target systems

# ─────────────────────────────────────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────────────────────────────────────
paths:

  # ── Account Posting ─────────────────────────────────────────────────────────

  /v2/payment/account-posting:
    post:
      tags: [ Account Posting ]
      summary: Create a posting
      description: Submits a new posting, validates it, routes to target systems in order, and returns the outcome.
      operationId: createPosting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IncomingPostingRequest'
            examples:
              imx_cbs_gl:
                summary: IMX — IMX_CBS_GL (CBS → GL, 2 legs)
                value:
                  source_name: "IMX"
                  source_reference_id: "SRC-001"
                  end_to_end_reference_id: "E2E-001"
                  credit_debit_indicator: "DEBIT"
                  request_type: "IMX_CBS_GL"
                  product_code: "FT"
                  clearing_system: "SWIFT"
                  requested_execution_date: "2026-03-23"
                  debtor_account: "1324658900"
                  creditor_account: "9875312300"
                  remittance_information: "Invoice payment INV-2026-001"
                  direction: "OUTGOING"
                  amount:
                    value: "1500.00"
                    currency_code: "USD"
              imx_obpm:
                summary: IMX — IMX_OBPM (OBPM, 1 leg)
                value:
                  source_name: "IMX"
                  source_reference_id: "SRC-002"
                  end_to_end_reference_id: "E2E-002"
                  credit_debit_indicator: "CREDIT"
                  request_type: "IMX_OBPM"
                  product_code: "FT"
                  clearing_system: "SWIFT"
                  requested_execution_date: "2026-03-23"
                  debtor_account: "1234567890"
                  creditor_account: "0987654321"
                  amount:
                    value: "800.00"
                    currency_code: "USD"
              rms_fed_return:
                summary: RMS — FED_RETURN (CBS → GL, 2 legs)
                value:
                  source_name: "RMS"
                  source_reference_id: "SRC-003"
                  end_to_end_reference_id: "E2E-003"
                  credit_debit_indicator: "CREDIT"
                  request_type: "FED_RETURN"
                  requested_execution_date: "2026-03-23"
                  debtor_account: "1234567890"
                  creditor_account: "0987654321"
                  amount:
                    value: "500.00"
                    currency_code: "USD"
              stablecoin_add_hold:
                summary: STABLECOIN — ADD_ACCOUNT_HOLD (CBS ADD_HOLD, 1 leg)
                value:
                  source_name: "STABLECOIN"
                  source_reference_id: "SRC-004"
                  end_to_end_reference_id: "E2E-004"
                  credit_debit_indicator: "DEBIT"
                  request_type: "ADD_ACCOUNT_HOLD"
                  requested_execution_date: "2026-03-23"
                  debtor_account: "1234567890"
                  creditor_account: "0987654321"
                  amount:
                    value: "5000.00"
                    currency_code: "USD"
              stablecoin_buy_customer_posting:
                summary: STABLECOIN — BUY_CUSTOMER_POSTING (CBS REMOVE_HOLD, 1 leg)
                value:
                  source_name: "STABLECOIN"
                  source_reference_id: "SRC-005"
                  end_to_end_reference_id: "E2E-005"
                  credit_debit_indicator: "DEBIT"
                  request_type: "BUY_CUSTOMER_POSTING"
                  requested_execution_date: "2026-03-23"
                  debtor_account: "1234567890"
                  creditor_account: "0987654321"
                  amount:
                    value: "5000.00"
                    currency_code: "USD"
      responses:
        '200':
          description: Posting created and processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountPostingCreateResponse'
              example:
                source_reference_id: "SRC-001"
                end_to_end_reference_id: "E2E-001"
                posting_status: "ACSP"
                processed_at: "2026-03-23T10:15:30Z"
                responses:
                  - name: "CBS"
                    type: "CBS"
                    account: "1324658900"
                    reference_id: "CBS-TXN-001"
                    posted_time: "2026-03-23T10:15:30Z"
                    status: "SUCCESS"
                    reason: null
                  - name: "GL"
                    type: "GL"
                    account: "9875312300"
                    reference_id: "GL-TXN-001"
                    posted_time: "2026-03-23T10:15:30Z"
                    status: "SUCCESS"
                    reason: null
        '400':
          description: Validation failure or malformed request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                validation_failed:
                  summary: Missing required fields
                  value:
                    id: "b7a44802-adde-4a5a-97b6-52f962209773"
                    name: "VALIDATION_FAILED"
                    message: "Request validation failed"
                    errors:
                      - field: "source_reference_id"
                        message: "must not be blank"
                        rejected_value: null
                      - field: "credit_debit_indicator"
                        message: "must not be null"
                        rejected_value: null
                invalid_enum:
                  summary: Unknown source_name
                  value:
                    id: "c1d2e3f4-0000-0000-0000-000000000001"
                    name: "INVALID_ENUM_VALUE"
                    message: "INVALID_ENUM_VALUE: sourceName 'UNKNOWN_SRC' is not valid"
                    errors: null
        '422':
          description: Business rule violation — duplicate e2e reference or no routing config found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                duplicate_e2e:
                  summary: Duplicate end-to-end reference
                  value:
                    id: "a1b2c3d4-0000-0000-0000-000000000001"
                    name: "DUPLICATE_E2E_REF"
                    message: "A posting with this end-to-end reference ID already exists"
                    errors: null
                no_config:
                  summary: No routing config found
                  value:
                    id: "a1b2c3d4-0000-0000-0000-000000000002"
                    name: "NO_CONFIG_FOUND"
                    message: "No posting config found for requestType: UNKNOWN_TYPE"
                    errors: null
        '500':
          $ref: '#/components/responses/InternalError'

  /v2/payment/account-posting/search:
    post:
      tags: [ Account Posting ]
      summary: Search postings
      description: Paginated, filterable search of active postings using a structured condition list.
      operationId: searchPostings
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostingSearchRequest'
            examples:
              search_all:
                summary: Return all postings (default pagination)
                value: {}
              search_by_source:
                summary: Filter by source name
                value:
                  conditions:
                    - property: source_name
                      operator: EQUALS
                      values: [ "IMX" ]
                  pagination:
                    offset: 1
                    limit: 20
              search_by_status:
                summary: Filter by status
                value:
                  conditions:
                    - property: status
                      operator: EQUALS
                      values: [ "PNDG" ]
              search_by_request_type:
                summary: Filter by request type
                value:
                  conditions:
                    - property: request_type
                      operator: EQUALS
                      values: [ "IMX_CBS_GL" ]
              search_by_date_range:
                summary: Filter by execution date range
                value:
                  conditions:
                    - property: requested_execution_date
                      operator: BETWEEN
                      values: [ "2026-01-01", "2026-12-31" ]
                  order_by:
                    - property: postingId
                      sort_order: DESC
              search_multiple_statuses:
                summary: Filter by multiple statuses
                value:
                  conditions:
                    - property: status
                      operator: IN
                      values: [ "PNDG", "ACSP" ]
      responses:
        '200':
          description: Paginated list of postings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedAccountPostingResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /v2/payment/account-posting/{posting_id}:
    get:
      tags: [ Account Posting ]
      summary: Get posting by ID
      description: Returns a single posting with all its transactions; checks active table first, then history.
      operationId: getPostingById
      parameters:
        - $ref: '#/components/parameters/PostingId'
      responses:
        '200':
          description: Posting found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountPostingResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /v2/payment/account-posting/retry:
    post:
      tags: [ Account Posting ]
      summary: Retry non-SUCCESS transactions on PNDG postings
      description: Re-processes failed or pending transactions on PNDG postings; omit posting_ids to retry all eligible.
      operationId: retryPostings
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetryRequest'
            examples:
              retry_all:
                summary: Retry all eligible PNDG postings
                value:
                  requested_by: "ops-user-01"
              retry_specific:
                summary: Retry specific posting IDs
                value:
                  posting_ids: [ 1, 2, 3 ]
                  requested_by: "ops-user-01"
      responses:
        '200':
          description: Retry completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetryResponse'
              example:
                total_postings: 3
                success_count: 2
                failed_count: 1
        '500':
          $ref: '#/components/responses/InternalError'

  # ── Posting Transactions ─────────────────────────────────────────────────────

  /v2/payment/account-posting/{posting_id}/transaction:
    get:
      tags: [ Posting Transactions ]
      summary: List transactions for a posting
      description: Returns all transactions for a posting ordered by transaction sequence.
      operationId: listTransactions
      parameters:
        - $ref: '#/components/parameters/PostingId'
      responses:
        '200':
          description: List of transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccountPostingTransactionResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /v2/payment/account-posting/{posting_id}/transaction/{transaction_id}:
    get:
      tags: [ Posting Transactions ]
      summary: Get a single transaction
      operationId: getTransaction
      parameters:
        - $ref: '#/components/parameters/PostingId'
        - $ref: '#/components/parameters/TransactionId'
      responses:
        '200':
          description: Transaction found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountPostingTransactionResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    patch:
      tags: [ Posting Transactions ]
      summary: Manual status update (UI)
      description: Sets the transaction status manually from the UI; sets mode=MANUAL, does not call any external system.
      operationId: manualUpdateTransaction
      parameters:
        - $ref: '#/components/parameters/PostingId'
        - $ref: '#/components/parameters/TransactionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManualUpdateTransactionRequest'
            examples:
              mark_success:
                summary: Manually mark transaction as SUCCESS
                value:
                  status: "SUCCESS"
                  reason: "Confirmed by ops team"
                  requested_by: "ops-user-01"
              mark_failed:
                summary: Manually mark transaction as FAILED
                value:
                  status: "FAILED"
                  reason: "Rejected by CBS — duplicate transaction"
                  requested_by: "ops-user-01"
      responses:
        '200':
          description: Transaction status updated manually
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountPostingTransactionResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # ── Posting Config ──────────────────────────────────────────────────────────

  /v2/payment/account-posting/config:
    get:
      tags: [ Posting Config ]
      summary: Get all config entries
      description: Returns every row in `posting_config` ordered by `config_id`.
      operationId: getAllConfig
      responses:
        '200':
          description: Full config list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PostingConfigResponse'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      tags: [ Posting Config ]
      summary: Create a config entry
      description: Adds a new routing rule; duplicate (request_type, order_seq) returns HTTP 422.
      operationId: createConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostingConfigRequest'
            example:
              source_name: "IMX"
              request_type: "IMX_CBS_GL"
              target_system: "CBS"
              operation: "POSTING"
              order_seq: 1
      responses:
        '201':
          description: Config entry created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostingConfigResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '422':
          description: Duplicate (request_type, order_seq)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                id: "d4e5f6a7-0000-0000-0000-000000000001"
                name: "DUPLICATE_CONFIG_ORDER"
                message: "A config entry with the same request type and order already exists"
                errors: null
        '500':
          $ref: '#/components/responses/InternalError'

  /v2/payment/account-posting/config/{request_type}:
    get:
      tags: [ Posting Config ]
      summary: Get config entries by request type
      description: Returns ordered transactions (target_system + operation) for a given request_type; result is cached.
      operationId: getConfigByRequestType
      parameters:
        - name: request_type
          in: path
          required: true
          description: The request type to look up (e.g. `IMX_CBS_GL`, `FED_RETURN`)
          schema:
            type: string
            example: IMX_CBS_GL
      responses:
        '200':
          description: Config entries for the given request type
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PostingConfigResponse'
              example:
                - config_id: 1
                  source_name: "IMX"
                  request_type: "IMX_CBS_GL"
                  target_system: "CBS"
                  operation: "POSTING"
                  order_seq: 1
                - config_id: 2
                  source_name: "IMX"
                  request_type: "IMX_CBS_GL"
                  target_system: "GL"
                  operation: "POSTING"
                  order_seq: 2
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /v2/payment/account-posting/config/{config_id}:
    put:
      tags: [ Posting Config ]
      summary: Update a config entry
      operationId: updateConfig
      parameters:
        - $ref: '#/components/parameters/ConfigId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostingConfigRequest'
      responses:
        '200':
          description: Config entry updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostingConfigResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Duplicate (request_type, order_seq)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags: [ Posting Config ]
      summary: Delete a config entry
      operationId: deleteConfig
      parameters:
        - $ref: '#/components/parameters/ConfigId'
      responses:
        '204':
          description: Config entry deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

# ─────────────────────────────────────────────────────────────────────────────
# COMPONENTS
# ─────────────────────────────────────────────────────────────────────────────
components:

  # ── Parameters ──────────────────────────────────────────────────────────────
  parameters:
    PostingId:
      name: posting_id
      in: path
      required: true
      description: Unique posting identifier
      schema:
        type: integer
        format: int64
        example: 1

    TransactionId:
      name: transaction_id
      in: path
      required: true
      description: Unique transaction identifier
      schema:
        type: integer
        format: int64
        example: 1

    ConfigId:
      name: config_id
      in: path
      required: true
      description: Unique posting config identifier
      schema:
        type: integer
        format: int64
        example: 1

  # ── Reusable Responses ───────────────────────────────────────────────────────
  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            id: "f1e2d3c4-0000-0000-0000-000000000001"
            name: "NOT_FOUND"
            message: "AccountPosting not found with id: 99"
            errors: null

    ValidationError:
      description: Bean validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            id: "b7a44802-adde-4a5a-97b6-52f962209773"
            name: "VALIDATION_FAILED"
            message: "Request validation failed"
            errors:
              - field: "source_reference_id"
                message: "must not be blank"
                rejected_value: null

    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            id: "e9f8a7b6-0000-0000-0000-000000000001"
            name: "INTERNAL_ERROR"
            message: "An unexpected error occurred"
            errors: null

  # ── Schemas ──────────────────────────────────────────────────────────────────
  schemas:

    # ── Enums ─────────────────────────────────────────────────────────────────
    PostingStatus:
      type: string
      enum: [ PNDG, ACSP, RJCT ]
      description: "Posting lifecycle status: PNDG=pending, ACSP=all transactions succeeded, RJCT=rejected."

    TransactionStatus:
      type: string
      enum: [ PENDING, SUCCESS, FAILED ]
      description: Transaction execution status.

    TransactionMode:
      type: string
      enum: [ NORM, RETRY, MANUAL ]
      description: "How the transaction was last processed: NORM=initial, RETRY=re-executed, MANUAL=UI override."

    CreditDebitIndicator:
      type: string
      enum: [ CREDIT, DEBIT ]
      description: Direction of the posting from the debtor's perspective

    # ── Requests ──────────────────────────────────────────────────────────────
    PostingSearchRequest:
      type: object
      description: Structured search request with optional conditions, ordering, and pagination.
      properties:
        conditions:
          type: array
          description: "List of filter conditions ANDed together. Supported properties: status, source_name, source_reference_id, end_to_end_reference_id, request_type, target_system, requested_execution_date, amount, currency, debtor_account, creditor_account. Supported operators: EQUALS, IN, CONTAINS, STARTS_WITH, ENDS_WITH, GREATER_THAN, LESS_THAN, BETWEEN, CONTAINS_ANY, CONTAINS_ALL."
          items:
            $ref: '#/components/schemas/SearchCondition'
        order_by:
          type: array
          description: Sort fields in priority order
          items:
            $ref: '#/components/schemas/SearchOrderBy'
        pagination:
          $ref: '#/components/schemas/SearchPagination'

    SearchCondition:
      type: object
      properties:
        property:
          type: string
          description: Field name to filter on (snake_case)
          example: source_name
        operator:
          type: string
          description: "Comparison operator. One of: EQUALS, IN, CONTAINS, STARTS_WITH, ENDS_WITH, GREATER_THAN, LESS_THAN, BETWEEN, CONTAINS_ANY, CONTAINS_ALL"
          example: EQUALS
        values:
          type: array
          description: One or more values to compare against (two values required for BETWEEN)
          items:
            type: string
          example: [ "IMX" ]

    SearchOrderBy:
      type: object
      properties:
        property:
          type: string
          description: Field name to sort by
          example: postingId
        sort_order:
          type: string
          description: "ASC or DESC"
          example: DESC

    SearchPagination:
      type: object
      properties:
        offset:
          type: integer
          description: 1-based starting position of the result set
          default: 1
          minimum: 1
          example: 1
        limit:
          type: integer
          description: Maximum number of records to return
          default: 20
          minimum: 1
          maximum: 500
          example: 20

    Amount:
      type: object
      description: Transaction amount with currency
      properties:
        value:
          type: string
          description: Transaction amount as a string. Must represent a positive decimal number.
          example: "1500.00"
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
          description: ISO 4217 3-letter currency code
          example: "USD"

    IncomingPostingRequest:
      type: object
      description: Payload for creating a new account posting
      required:
        - source_name
        - source_reference_id
        - end_to_end_reference_id
        - credit_debit_indicator
        - request_type
        - requested_execution_date
        - debtor_account
        - creditor_account
        - amount
      properties:
        source_name:
          type: string
          description: "Name of the originating system. Valid values: IMX | RMS | STABLECOIN"
          example: "IMX"
        source_reference_id:
          type: string
          description: Upstream system's own reference for this posting
          example: "SRC-20260323-001"
        end_to_end_reference_id:
          type: string
          description: Unique end-to-end identifier. Used for idempotency — duplicate value returns HTTP 422.
          example: "E2E-20260323-001"
        credit_debit_indicator:
          type: string
          description: "Direction of the posting. Valid values: CREDIT | DEBIT"
          example: "DEBIT"
        request_type:
          type: string
          description: Transaction type that determines the routing strategy from `posting_config`.
          example: "IMX_CBS_GL"
        product_code:
          type: string
          description: Product code for the transaction
          example: "FT"
        clearing_system:
          type: string
          description: Clearing system used for the transaction
          example: "SWIFT"
        requested_execution_date:
          type: string
          description: Requested value date (ISO 8601 date string)
          example: "2026-03-23"
        debtor_account:
          type: string
          description: Account number of the debtor
          example: "1324658900"
        creditor_account:
          type: string
          description: Account number of the creditor
          example: "9875312300"
        remittance_information:
          type: string
          description: Free-text payment reference (optional)
          example: "Invoice payment INV-2026-001"
        direction:
          type: string
          description: "Direction of the payment flow. E.g. OUTGOING | INCOMING"
          example: "OUTGOING"
        amount:
          $ref: '#/components/schemas/Amount'
        team_code:
          type: string
          description: Team code for routing or ownership identification
          example: "PAYMENTS"
        debit_rc:
          type: string
          description: Debit RC reference
          example: "DB-RC-001"
        credit_rc:
          type: string
          description: Credit RC reference
          example: "CR-RC-001"
        transaction_code:
          type: string
          description: Transaction code for the posting
          example: "TXN-CODE-01"
        branch:
          type: string
          description: Branch identifier for the posting
          example: "BRANCH-001"
        loan_type:
          type: string
          description: Loan type associated with the posting
          example: "PERSONAL"
        line_desc:
          type: string
          description: Line description for the posting entry
          example: "Customer payment flow"
        cif:
          type: string
          description: Customer Information File number
          example: "CIF-123456"
        customer_name:
          type: string
          description: Name of the customer associated with the transaction
          example: "John Doe"
        hold_id:
          type: string
          description: Hold identifier for CBS hold operations
          example: "HOLD-001"

    RetryRequest:
      type: object
      description: Specifies which postings to retry; omit posting_ids to retry all eligible PNDG postings.
      required:
        - requested_by
      properties:
        posting_ids:
          type: array
          items:
            type: integer
            format: int64
          description: Specific posting IDs to retry. If absent or empty, all eligible PNDG postings are targeted.
          example: [ 1, 2, 3 ]
        requested_by:
          type: string
          description: User or system initiating the retry
          example: "ops-user-01"

    ManualUpdateTransactionRequest:
      type: object
      description: Manually overrides a transaction status from the UI; sets mode=MANUAL.
      required:
        - status
        - requested_by
      properties:
        status:
          $ref: '#/components/schemas/TransactionStatus'
        reason:
          type: string
          maxLength: 500
          description: Optional override explanation
          example: "Confirmed by ops team"
        requested_by:
          type: string
          description: User or system initiating the manual override
          example: "ops-user-01"

    PostingConfigRequest:
      type: object
      description: Payload for creating or updating a routing config entry
      required:
        - source_name
        - request_type
        - target_system
        - operation
        - order_seq
      properties:
        source_name:
          type: string
          description: "Originating system name. Valid values: IMX | RMS | STABLECOIN"
          example: "IMX"
        request_type:
          type: string
          description: Transaction type
          example: "IMX_CBS_GL"
        target_system:
          type: string
          description: "External system to route to. Valid values: CBS | GL | OBPM"
          example: "CBS"
        operation:
          type: string
          description: "Operation to perform. Valid values: POSTING | ADD_HOLD | REMOVE_HOLD"
          example: "POSTING"
        order_seq:
          type: integer
          minimum: 1
          description: Execution order (1-based). Must be unique per `request_type`.
          example: 1

    # ── Responses ─────────────────────────────────────────────────────────────
    AccountPostingCreateResponse:
      type: object
      description: Immediate response after a posting is created and processed.
      properties:
        source_reference_id:
          type: string
          example: "SRC-20260323-001"
        end_to_end_reference_id:
          type: string
          example: "E2E-20260323-001"
        posting_status:
          $ref: '#/components/schemas/PostingStatus'
        processed_at:
          type: string
          format: date-time
          description: Timestamp when processing completed
          example: "2026-03-23T10:15:30Z"
        responses:
          type: array
          description: Result from each transaction processed during this call
          items:
            $ref: '#/components/schemas/TransactionCreateResponse'

    TransactionCreateResponse:
      type: object
      description: Summary result of a single transaction during the initial create flow.
      properties:
        name:
          type: string
          description: Target system identifier
          example: "CBS"
        type:
          type: string
          description: Leg type
          example: "CBS"
        account:
          type: string
          example: "1324658900"
        reference_id:
          type: string
          description: Reference ID returned by the external system (null if failed)
          example: "CBS-TXN-001"
        posted_time:
          type: string
          format: date-time
          example: "2026-03-23T10:15:30Z"
        status:
          type: string
          example: "SUCCESS"
        reason:
          type: string
          description: Error message if failed, null on success
          nullable: true
          example: null

    AccountPostingResponse:
      type: object
      description: Full posting detail including all transactions.
      properties:
        posting_id:
          type: integer
          format: int64
          example: 1
        source_reference_id:
          type: string
          example: "SRC-20260323-001"
        end_to_end_reference_id:
          type: string
          example: "E2E-20260323-001"
        source_name:
          type: string
          example: "IMX"
        request_type:
          type: string
          example: "IMX_CBS_GL"
        amount:
          type: number
          format: decimal
          example: 1500.00
        currency:
          type: string
          example: "USD"
        credit_debit_indicator:
          type: string
          example: "DEBIT"
        debtor_account:
          type: string
          example: "1324658900"
        creditor_account:
          type: string
          example: "9875312300"
        requested_execution_date:
          type: string
          format: date
          example: "2026-03-23"
        remittance_information:
          type: string
          nullable: true
          example: "Invoice payment INV-2026-001"
        posting_status:
          $ref: '#/components/schemas/PostingStatus'
        target_systems:
          type: string
          description: Concatenated target system keys in execution order (e.g. CBS_GL).
          example: "CBS_GL"
        reason:
          type: string
          nullable: true
          description: Processing outcome message; success message or last failed transaction error.
          example: "Request processed successfully"
        processed_at:
          type: string
          format: date-time
          nullable: true
          example: "2026-03-23T10:15:30Z"
        created_at:
          type: string
          format: date-time
          example: "2026-03-23T10:15:29Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-03-23T10:15:30Z"
        responses:
          type: array
          description: Transaction results
          items:
            $ref: '#/components/schemas/TransactionResponse'

    TransactionResponse:
      type: object
      description: Transaction summary embedded in AccountPostingResponse.
      properties:
        transaction_id:
          type: integer
          format: int64
          example: 1
        transaction_order:
          type: integer
          example: 1
        name:
          type: string
          description: Target system identifier
          example: "CBS"
        type:
          type: string
          example: "CBS"
        account:
          type: string
          example: "1324658900"
        reference_id:
          type: string
          nullable: true
          example: "CBS-TXN-001"
        posted_time:
          type: string
          format: date-time
          nullable: true
          example: "2026-03-23T10:15:30Z"
        status:
          type: string
          example: "SUCCESS"
        reason:
          type: string
          nullable: true
          example: null
        mode:
          type: string
          example: "NORM"

    AccountPostingTransactionResponse:
      type: object
      description: Full transaction detail returned by the transaction endpoints.
      properties:
        transaction_id:
          type: integer
          format: int64
          example: 1
        posting_id:
          type: integer
          format: int64
          example: 1
        transaction_order:
          type: integer
          example: 1
        target_system:
          type: string
          example: "CBS"
        account:
          type: string
          example: "1324658900"
        status:
          $ref: '#/components/schemas/TransactionStatus'
        reference_id:
          type: string
          nullable: true
          example: "CBS-TXN-001"
        reason:
          type: string
          nullable: true
          example: null
        attempt_number:
          type: integer
          description: Number of execution attempts for this transaction (starts at 1).
          example: 1
        posted_time:
          type: string
          format: date-time
          nullable: true
          example: "2026-03-23T10:15:30Z"
        mode:
          $ref: '#/components/schemas/TransactionMode'
        operation:
          type: string
          description: "Operation type: POSTING | ADD_HOLD | REMOVE_HOLD"
          example: "POSTING"
        created_at:
          type: string
          format: date-time
          example: "2026-03-23T10:15:29Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-03-23T10:15:30Z"

    PostingConfigResponse:
      type: object
      description: A single routing config entry
      properties:
        config_id:
          type: integer
          format: int64
          example: 1
        source_name:
          type: string
          example: "IMX"
        request_type:
          type: string
          example: "IMX_CBS_GL"
        target_system:
          type: string
          example: "CBS"
        operation:
          type: string
          example: "POSTING"
        order_seq:
          type: integer
          example: 1

    RetryResponse:
      type: object
      description: Summary of a retry operation at posting level.
      properties:
        total_postings:
          type: integer
          description: Total postings processed in this retry run
          example: 3
        success_count:
          type: integer
          description: Postings that reached ACSP (all transactions succeeded)
          example: 2
        failed_count:
          type: integer
          description: Postings that remained PNDG after retry
          example: 1

    PagedAccountPostingResponse:
      type: object
      description: Paginated list of postings.
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/AccountPostingResponse'
        pageable:
          $ref: '#/components/schemas/Pageable'
        total_elements:
          type: integer
          format: int64
          description: Total records matching the filter
          example: 42
        total_pages:
          type: integer
          description: Total number of pages
          example: 3
        number:
          type: integer
          description: Current page number (0-based)
          example: 0
        size:
          type: integer
          description: Requested page size
          example: 20
        number_of_elements:
          type: integer
          description: Number of elements on the current page
          example: 20
        first:
          type: boolean
          example: true
        last:
          type: boolean
          example: false
        empty:
          type: boolean
          example: false

    Pageable:
      type: object
      description: Spring Data pageable metadata.
      properties:
        page_number:
          type: integer
          example: 0
        page_size:
          type: integer
          example: 20
        sort:
          type: object
          properties:
            sorted:
              type: boolean
            unsorted:
              type: boolean
            empty:
              type: boolean
        offset:
          type: integer
          format: int64
          example: 0
        paged:
          type: boolean
          example: true
        unpaged:
          type: boolean
          example: false

    ErrorResponse:
      type: object
      description: Uniform error envelope returned for all 4xx and 5xx responses.
      properties:
        id:
          type: string
          format: uuid
          description: Unique error trace ID for log correlation
          example: "b7a44802-adde-4a5a-97b6-52f962209773"
        name:
          type: string
          description: Machine-readable error code
          example: "VALIDATION_FAILED"
        message:
          type: string
          description: Human-readable error description
          example: "Request validation failed"
        errors:
          type: array
          description: Field-level validation errors — populated only for `VALIDATION_FAILED`
          nullable: true
          items:
            $ref: '#/components/schemas/FieldError'

    FieldError:
      type: object
      description: A single field-level validation error
      properties:
        field:
          type: string
          description: The field name that failed validation
          example: "source_reference_id"
        message:
          type: string
          description: Validation constraint message
          example: "must not be blank"
        rejected_value:
          description: The value that was rejected (null if the field was absent)
          nullable: true
          example: null
